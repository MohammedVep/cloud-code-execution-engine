services:
  redis:
    image: redis:7-alpine
    container_name: ccee-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: ccee-api
    environment:
      API_PORT: 8080
      REDIS_URL: redis://redis:6379
      AUTH_MODE: api_key
      JWT_JWKS_URL: ""
      JWT_ISSUER: ""
      JWT_AUDIENCE: ""
      JWT_TENANT_CLAIM: custom:tenant_id
      JWT_SUBJECT_CLAIM: sub
      RATE_LIMIT_REQUESTS_PER_MINUTE: 240
      RATE_LIMIT_WINDOW_SECONDS: 60
      SUBMIT_RATE_LIMIT_PER_MINUTE: 60
      MAX_SOURCE_CODE_BYTES: 100000
      MAX_STDIN_BYTES: 100000
      JOB_QUEUE_NAME: code-jobs
      JOB_TTL_SECONDS: 86400
      JOB_HISTORY_MAX: 500
      JOB_LIST_DEFAULT_LIMIT: 20
      JOB_LIST_MAX_LIMIT: 100
      AUDIT_STREAM_KEY: audit:events
      DAILY_QUOTA_TTL_SECONDS: 172800
      QUEUE_JOB_ATTEMPTS: 3
      QUEUE_RETRY_BACKOFF_MS: 1000
      ANALYSIS_MAX_SOURCE_CHARS: 8000
      AI_PROVIDER: none
      OPENAI_MODEL: gpt-4.1-mini
      AI_ANALYSIS_TIMEOUT_MS: 10000
      AI_ANALYSIS_RETRIES: 2
      AI_ANALYSIS_RETRY_BACKOFF_MS: 500
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: ccee-api
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      METRICS_WINDOW_SECONDS: 60
      METRICS_SAMPLE_LIMIT: 1000
      WORKER_FLEET_CAPACITY: 4
      OPENAI_API_KEY: ""
      TENANT_POLICIES_JSON: "{}"
      TENANT_API_KEYS_JSON: '{"dev-local-key":{"tenantId":"tenant-dev","maxConcurrentJobs":5,"maxDailyJobs":1000}}'
    ports:
      - "8080:8080"
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ccee-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.3.1
    container_name: ccee-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    container_name: ccee-worker
    environment:
      REDIS_URL: redis://redis:6379
      JOB_QUEUE_NAME: code-jobs
      JOB_TTL_SECONDS: 86400
      WORKER_CONCURRENCY: 4
      QUEUE_JOB_ATTEMPTS: 3
      QUEUE_RETRY_BACKOFF_MS: 1000
      EXECUTION_BACKEND: local
      RUNNER_IMAGE: ccee-runner:local
      MAX_STDIO_BYTES: 65536
      AUDIT_STREAM_KEY: audit:events
      QUEUE_DEPTH_METRIC_NAMESPACE: CCEE
      QUEUE_DEPTH_METRIC_NAME: PendingJobsCount
      QUEUE_DEPTH_PUBLISH_INTERVAL_MS: 30000
      QUEUE_DEPTH_METRIC_SERVICE_NAME: worker
      OTEL_ENABLED: "false"
      OTEL_SERVICE_NAME: ccee-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
